spring:
  datasource:
    url: jdbc:mysql://10.211.55.6:3306/lwh_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: admin
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: 10.211.55.6
    port: 6379
    password: 123456
    database: 0
    timeout: 3000
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    user:
      name: admin
      password: 123456
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations:
        - classpath:sql/schema.sql
        - classpath:sql/rag_qdrant_migration.sql
      data-locations:
        - classpath:sql/data.sql
  # Spring AI RAG 配置，用于文档分片后的本地向量化和 Qdrant 入库。
  ai:
    model:
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      init:
        pull-model-strategy: never
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:10.211.55.6}
        port: ${QDRANT_GRPC_PORT:6334}
        api-key: ${QDRANT_API_KEY:123456}
        collection-name: lwh_document_chunks
        initialize-schema: true

mybatis:
