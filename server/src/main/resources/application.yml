spring:
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://10.211.55.6:3306/lwh_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&connectionTimeZone=Asia/Shanghai&forceConnectionTimeZoneToSession=true&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:admin}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: ${REDIS_HOST:10.211.55.6}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:123456}
    database: 0
    timeout: 3000
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  security:
    user:
      name: admin
      password: ${SPRING_SECURITY_PASSWORD:}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations:
        - classpath:init.sql
      data-locations:
        - classpath:test_data.sql
  # Spring AI RAG 配置，用于文档分片后的本地向量化和 Qdrant 入库。
  ai:
    model:
      embedding: ollama
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      init:
        pull-model-strategy: never
      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:bge-m3}
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:10.211.55.6}
        port: ${QDRANT_GRPC_PORT:6334}
        api-key: ${QDRANT_API_KEY:123456}
        collection-name: lwh_document_chunks
        initialize-schema: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.linkwisehub.modules.base.entity
  configuration:
    map-underscore-to-camel-case: true

