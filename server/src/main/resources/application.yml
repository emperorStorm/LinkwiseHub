# 业务 AI 配置，用于智能问答等聊天能力。
ai:
  document:
    bucket-name: knowledge-base
    processing:
      # 自动选择：现代 Office、PDF 和图片使用 MinerU，其余支持格式使用兼容解析。
      strategy: ${AI_DOCUMENT_PARSE_STRATEGY:AUTO}
      service-base-url: ${AI_SERVICE_BASE_URL:http://127.0.0.1:8090}
      service-token: ${AI_SERVICE_TOKEN:18acc77c588ec0f910eefa06499e738612af6d636aaf78377b71f8216ab9a1f9}
      scheduler-enabled: ${AI_DOCUMENT_SCHEDULER_ENABLED:true}
      request-timeout-seconds: ${AI_SERVICE_REQUEST_TIMEOUT_SECONDS:120}
      poll-batch-size: ${AI_DOCUMENT_POLL_BATCH_SIZE:20}
      initial-poll-seconds: ${AI_DOCUMENT_INITIAL_POLL_SECONDS:3}
      max-poll-seconds: ${AI_DOCUMENT_MAX_POLL_SECONDS:15}
      task-timeout-minutes: ${AI_DOCUMENT_TASK_TIMEOUT_MINUTES:60}
      max-attempts: ${AI_DOCUMENT_MAX_ATTEMPTS:3}
      scheduler-delay-ms: ${AI_DOCUMENT_SCHEDULER_DELAY_MS:3000}
  # AI服务提供商: deepseek, aliyun, minimax, ollama
  provider: ${AI_PROVIDER:deepseek}
  # 默认模型: deepseek-v4-flash, qwen3.5-plus, MiniMax-M2.7-highspeed, qwen3.6:latest
  default-model: ${AI_DEFAULT_MODEL:deepseek-v4-flash}
  deepseek:
    api-key: ${AI_DEEPSEEK_API_KEY:}
    model: ${AI_DEEPSEEK_MODEL:deepseek-v4-flash}
    base-url: ${AI_DEEPSEEK_BASE_URL:https://api.deepseek.com}
    timeout: 30000
    max-tokens: 2000
    temperature: 0.7
  aliyun:
    # 仅用于普通百炼聊天 provider；RAG embedding 已切换为本地 Ollama bge-m3。
    api-key: ${AI_DASHSCOPE_API_KEY:}
    model: ${AI_DASHSCOPE_MODEL:qwen3.5-plus}
    base-url: ${AI_DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    timeout: 30000
    max-tokens: 2000
    temperature: 0.7
  minimax:
    api-key: ${AI_MINIMAX_API_KEY:}
    model: ${AI_MINIMAX_MODEL:MiniMax-M2.7-highspeed}
    base-url: ${AI_MINIMAX_BASE_URL:https://api.minimax.chat/v1}
    timeout: 30000
    max-tokens: 2000
    temperature: 1.0
  ollama:
    model: ${AI_OLLAMA_MODEL:qwen3.6:latest}
    base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
    timeout: 600000
    max-tokens: 2000
    temperature: 0.7
  retry:
    # 是否启用重试机制
    enabled: true
    # 最大重试次数
    max-attempts: 3
    # 初始重试间隔（毫秒）
    delay-ms: 1000
    # 最大重试间隔（毫秒）
    max-delay-ms: 5000
    # 乘法因子（用于指数退避）
    multiplier: 2.0
  chat:
    history:
      recent-rounds: 6
      local-recent-rounds: 3
      summary-trigger-rounds: 6
      summary-max-chars: 1200
      history-max-chars: 8000
      local-history-max-chars: 3000
  search:
    elasticsearch:
      enabled: true
      uris: ${ELASTICSEARCH_URIS:http://10.211.55.6:9200}
      username: ${ELASTICSEARCH_USERNAME:elastic}
      password: ${ELASTICSEARCH_PASSWORD:j+WixZJMxOp/phxFbHAR12i74wXwYgVc}
      index-name: lwh_document_chunks_bm25
      top-k: 20
      title-boost: 2.0
      content-boost: 1.0
      rebuild-batch-size: 200

# 阿里智能外呼机器人配置
aliyun:
  outbound-bot:
    # demo 默认关闭；本地联调时通过环境变量或本地私有配置开启
    enabled: ${ALIYUN_OUTBOUND_BOT_ENABLED:false}
    access-key-id: ${ALIYUN_OUTBOUND_BOT_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OUTBOUND_BOT_ACCESS_KEY_SECRET:}
    endpoint: ${ALIYUN_OUTBOUND_BOT_ENDPOINT:outboundbot.cn-shanghai.aliyuncs.com}
    region-id: ${ALIYUN_OUTBOUND_BOT_REGION_ID:cn-shanghai}
    instance-id: ${ALIYUN_OUTBOUND_BOT_INSTANCE_ID:}
    script-id: ${ALIYUN_OUTBOUND_BOT_SCRIPT_ID:}
    scenario-id: ${ALIYUN_OUTBOUND_BOT_SCENARIO_ID:}
    calling-numbers: ${ALIYUN_OUTBOUND_BOT_CALLING_NUMBERS:}
    recall-calling-numbers: ${ALIYUN_OUTBOUND_BOT_RECALL_CALLING_NUMBERS:}
    callback-secret: ${ALIYUN_OUTBOUND_BOT_CALLBACK_SECRET:}
    source-ip-whitelist: ${ALIYUN_OUTBOUND_BOT_SOURCE_IP_WHITELIST:}
    connect-timeout-seconds: ${ALIYUN_OUTBOUND_BOT_CONNECT_TIMEOUT_SECONDS:3}
    read-timeout-seconds: ${ALIYUN_OUTBOUND_BOT_READ_TIMEOUT_SECONDS:10}
    async-wait-timeout-seconds: ${ALIYUN_OUTBOUND_BOT_ASYNC_WAIT_TIMEOUT_SECONDS:10}
    callback-timestamp-tolerance-seconds: ${ALIYUN_OUTBOUND_BOT_CALLBACK_TIMESTAMP_TOLERANCE_SECONDS:300}
