services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mineru:
        condition: service_healthy
    restart: unless-stopped

  mineru:
    build:
      context: .
      dockerfile: Dockerfile.mineru
    environment:
      MINERU_API_HOST: 0.0.0.0
      MINERU_API_PORT: 8000
      MINERU_API_MAX_CONCURRENT_REQUESTS: 1
    ports:
      - "8000:8000"
    volumes:
      - mineru-models:/root/.cache
      - mineru-output:/tmp/mineru
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  mineru-models:
  mineru-output:
